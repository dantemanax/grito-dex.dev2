<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grito-Dex Sinnoh Grid</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>

    <div class="pokedex-frame">
        <header class="pokedex-header">
            <div class="main-sensor"></div>
            <div class="status-lights">
                <span class="light red"></span>
                <span class="light yellow"></span>
                <span class="light green"></span>
            </div>
            <h1 class="title">GRITO-DEX</h1>
        </header>

        <nav class="pokedex-nav">
            <button class="nav-btn">JUGAR</button>
            <button class="nav-btn active">DEX</button>
        </nav>

        <main class="dex-screen">
            <div class="stats-bar">
                VISTOS: <span id="vistos-count">0</span>
            </div>

            <div id="pokemon-grid" class="dex-grid"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
