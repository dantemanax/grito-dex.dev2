<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grito-Dex Sinnoh Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="pokedex-frame">
        <header class="pokedex-header">
            <div class="sensor-blue"></div>
            <div class="lights">
                <span class="light red"></span>
                <span class="light yellow"></span>
                <span class="light green"></span>
            </div>
            <h1>GRITO-DEX</h1>
        </header>

        <nav class="pokedex-tabs">
            <button class="tab-btn">JUGAR</button>
            <button class="tab-btn active">DEX</button>
        </nav>

        <main class="dex-screen">
            <div class="counter">VISTOS: 62</div>

            <div class="dex-list">
                <div class="dex-item">
                    <div class="sprite-box">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/5.png" alt="Charmeleon">
                    </div>
                    <div class="info-box">
                        <span class="pk-number">#5</span>
                        <span class="pk-name">CHARMELEON</span>
                    </div>
                </div>

                <div class="dex-item">
                    <div class="sprite-box">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/8.png" alt="Wartortle">
                    </div>
                    <div class="info-box">
                        <span class="pk-number">#8</span>
                        <span class="pk-name">WARTORTLE</span>
                    </div>
                </div>

                <div class="dex-item">
                    <div class="sprite-box">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/26.png" alt="Raichu">
                    </div>
                    <div class="info-box">
                        <span class="pk-number">#26</span>
                        <span class="pk-name">RAICHU</span>
                    </div>
                </div>
                
                </div>
        </main>
    </div>

</body>
</html>
